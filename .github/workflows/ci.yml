name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck API
        run: npm run typecheck -w @atlas/api
      - name: Regenerate seeds (must be deterministic)
        run: npm run seed:build -w @atlas/api
      - name: Test schema + seeds against Postgres (PGlite)
        run: npm run db:test -w @atlas/api
      - name: Lint web
        run: npm run lint -w @atlas/web
      - name: Typecheck web
        run: npm run typecheck -w @atlas/web
      - name: Build web (static export)
        run: npm run build -w @atlas/web
