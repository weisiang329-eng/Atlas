# Atlas API — Cloudflare Worker
#
# The Worker runs Hono and connects to Supabase Postgres over the Transaction
# pooler. The connection string is a Worker secret (never in this file):
#
#   wrangler secret put DATABASE_URL       # the Supabase pooler URL (port 6543)
#   wrangler secret put ANTHROPIC_API_KEY  # the Claude key for the agent
#   wrangler deploy
#
# `nodejs_compat` is required for postgres.js to use Cloudflare's TCP sockets.

name = "atlas-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Who may call this API from a browser. Not a secret — it is a policy, so it
# belongs in version control where a change is reviewable. `*.` matches any
# subdomain, which covers the per-deploy Pages preview URLs.
# Add a custom domain here the day one is pointed at the site.
[vars]
ALLOWED_ORIGINS = "https://atlas-web-2yd.pages.dev,*.atlas-web-2yd.pages.dev"

# Pretty JSON + observability in the dashboard.
[observability]
enabled = true

# Bundle migration SQL as text modules so the Worker can apply its own schema.
# The Worker already holds DATABASE_URL; making it self-migrating means a new
# table never requires anyone to paste SQL into a dashboard by hand.
[[rules]]
type = "Text"
globs = ["**/*.sql"]
fallthrough = true
